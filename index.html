            }

            // ==================== ANALYSIS PAGE ====================
            function renderAnalysisMobile() {
                let totalRevenue = sales.reduce((acc, s) => acc + (s.finalTotal || 0), 0);
                let totalCost = 0;
                let productSales = {};
                
                sales.forEach(s => {
                    if (s.items) {
                        s.items.forEach(itm => {
                            let prod = products.find(p => p.id === itm.productId) || { buyPrice: 0 };
                            totalCost += (prod.buyPrice || 0) * itm.qty;
                            
                            if (!productSales[itm.productId]) {
                                productSales[itm.productId] = { qty: 0, name: itm.name };
                            }
                            productSales[itm.productId].qty += itm.qty;
                        });
                    }
                });
                
                let totalExpenses = expenses.reduce((acc, e) => acc + (e.amount || 0), 0);
                let netProfit = totalRevenue - totalCost - totalExpenses;
                let profitMargin = totalRevenue > 0 ? ((netProfit / totalRevenue) * 100).toFixed(1) : 0;
                
                let topProduct = { name: 'None', qty: 0 };
                Object.values(productSales).forEach(p => {
                    if (p.qty > topProduct.qty) {
                        topProduct = p;
                    }
                });
                
                let transactionCount = sales.length;
                let avgOrderValue = transactionCount > 0 ? (totalRevenue / transactionCount).toFixed(0) : 0;
                let averageExpenseValue = expenses.length > 0 ? Math.round(totalExpenses / expenses.length) : 0;
                let profitMarginDisplay = `${Number(profitMargin) > 0 ? '+' : ''}${profitMargin}%`;
                let topProductName = topProduct.qty > 0 ? topProduct.name : 'No sales yet';
                let topProductNote = topProduct.qty > 0 ? `${topProduct.qty} sold` : '0 sold';

                // Build most / least / never sold lists
                const soldEntries = Object.entries(productSales)
                    .map(([id, d]) => ({ id, name: d.name, qty: d.qty }))
                    .sort((a, b) => b.qty - a.qty);
                const maxQtySold = soldEntries.length > 0 ? soldEntries[0].qty : 1;
                const mostSold = soldEntries.slice(0, 5);
                const leastSold = soldEntries.length > 1
                    ? [...soldEntries].reverse().slice(0, 3).filter(e => e.qty < soldEntries[0].qty)
                    : [];
                const soldIds = new Set(Object.keys(productSales).map(String));
                const neverSold = products.filter(p => !soldIds.has(String(p.id)));

                const buildRankRows = (list, cls) => list.map((p, i) => `
                    <div class="product-rank-item">
                        <div class="product-rank-pos ${cls}">${i + 1}</div>
                        <div class="product-rank-info">
                            <div class="product-rank-name">${p.name}</div>
                            <div class="product-rank-bar-wrap"><div class="product-rank-bar ${cls}" style="width:${Math.round((p.qty/maxQtySold)*100)}%"></div></div>
                        </div>
                        <div class="product-rank-qty" style="${cls==='cold'?'color:#94a3b8;':''}">${p.qty} sold</div>
                    </div>`).join('');
                
                let last7Days = [];
                let dailyRevenue = [];
                for (let i = 6; i >= 0; i--) {
                    let date = new Date();
                    date.setDate(date.getDate() - i);
                    let dateStr = date.toLocaleDateString('en', { weekday: 'short' });
                    last7Days.push(dateStr);
                    
                    let dayTotal = sales
                        .filter(s => new Date(s.date).toDateString() === date.toDateString())
                        .reduce((sum, s) => sum + s.finalTotal, 0);
                    dailyRevenue.push(dayTotal);
                }

                let html = `
                    <div class="analytics-page">
                        <section class="analytics-card analytics-hero">
                            <div class="analytics-hero-top">
                                <div class="analytics-hero-copy">
                                    <span class="analytics-eyebrow">${__('analysis')}</span>
                                    <h2>${__('analysis')}</h2>
                                    <p>${__('revenue')} · ${__('profit')} · ${__('expenses')}</p>
                                </div>
                                <button class="btn-small analytics-hero-btn" id="pdfAnalyticsBtn"><i class="fas fa-file-pdf"></i> ${__('pdfAnalytics')}</button>
                            </div>
                            <div class="analytics-hero-grid">
                                <div class="analytics-hero-metric">
                                    <span class="analytics-hero-label">${__('revenue')}</span>
                                    <strong>TSh ${totalRevenue.toLocaleString()}</strong>
                                </div>
                                <div class="analytics-hero-metric">
                                    <span class="analytics-hero-label">${__('profit')}</span>
                                    <strong>${netProfit < 0 ? '-' : ''}TSh ${Math.abs(netProfit).toLocaleString()}</strong>
                                </div>
                            </div>
                            <div class="analytics-hero-strip">
                                <span class="analytics-hero-chip"><i class="fas fa-receipt"></i> ${transactionCount} ${__('transactions')}</span>
                                <span class="analytics-hero-chip"><i class="fas fa-percent"></i> ${profitMarginDisplay}</span>
                            </div>
                        </section>

                        <section class="analytics-card">
                            <div class="analytics-section-head">
                                <div>
                                    <h4><i class="fas fa-layer-group icon-one"></i> ${__('analysis')}</h4>
                                    <p>${__('averageOrder')} · ${__('topProduct')} · ${__('transactions')}</p>
                                </div>
                            </div>
                            <div class="analytics-kpi-grid">
                                <article class="analytics-kpi-card analytics-kpi-green">
                                    <i class="fas fa-chart-line analytics-kpi-icon"></i>
                                    <div class="analytics-kpi-label">${__('profitMargin')}</div>
                                    <div class="analytics-kpi-value">${profitMarginDisplay}</div>
                                    <div class="analytics-kpi-note">${netProfit < 0 ? '-' : ''}TSh ${Math.abs(netProfit).toLocaleString()}</div>
                                </article>
                                <article class="analytics-kpi-card analytics-kpi-amber">
                                    <i class="fas fa-bag-shopping analytics-kpi-icon"></i>
                                    <div class="analytics-kpi-label">${__('transactions')}</div>
                                    <div class="analytics-kpi-value">${transactionCount}</div>
                                    <div class="analytics-kpi-note">${__('salesHistory')}</div>
                                </article>
                                <article class="analytics-kpi-card analytics-kpi-violet">
                                    <i class="fas fa-credit-card analytics-kpi-icon"></i>
                                    <div class="analytics-kpi-label">${__('averageOrder')}</div>
                                    <div class="analytics-kpi-value">TSh ${Number(avgOrderValue).toLocaleString()}</div>
                                    <div class="analytics-kpi-note">${__('revenue')}</div>
                                </article>
                                <article class="analytics-kpi-card analytics-kpi-rose">
                                    <i class="fas fa-star analytics-kpi-icon"></i>
                                    <div class="analytics-kpi-label">${__('topProduct')}</div>
                                    <div class="analytics-kpi-value">${topProductName}</div>
                                    <div class="analytics-kpi-note">${topProductNote}</div>
                                </article>
                            </div>
                        </section>

                        <section class="analytics-card">
                            <div class="analytics-section-head">
                                <div>
                                    <h4><i class="fas fa-trophy icon-one"></i> Product Performance</h4>
                                    <p>Most sold · least sold · never sold</p>
                                </div>
                            </div>
                            ${soldEntries.length === 0 && neverSold.length === 0 ? `<div style="text-align:center;color:#94a3b8;padding:1rem;font-size:0.9rem;">No product data yet</div>` : `
                                ${mostSold.length > 0 ? `
                                <div style="font-size:0.72rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;color:#06c6d4;margin-bottom:0.7rem;">&#127942; Most Sold</div>
                                <div class="product-rank-list">${buildRankRows(mostSold, 'top')}</div>` : ''}
                                ${leastSold.length > 0 ? `
                                <div class="product-rank-divider"></div>
                                <div style="font-size:0.72rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;color:#94a3b8;margin-bottom:0.7rem;">&#128201; Least Sold</div>
                                <div class="product-rank-list">${buildRankRows(leastSold, 'cold')}</div>` : ''}
                                ${neverSold.length > 0 ? `
                                <div class="product-rank-divider"></div>
                                <div style="font-size:0.72rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;color:#ef4444;margin-bottom:0.7rem;">&#128683; Never Sold</div>
                                <div style="display:flex;flex-direction:column;gap:0.45rem;">${neverSold.map(p => `<div class="product-rank-never"><i class="fas fa-box"></i> ${p.name}</div>`).join('')}</div>` : ''}
                            `}
                        </section>

                        <section class="analytics-card">
                            <div class="analytics-section-head">
                                <div>
                                    <h4><i class="fas fa-chart-area icon-one"></i> ${__('revenue')}</h4>
                                    <p>Last 7 days</p>
                                </div>
                                <span class="analytics-mini-chip">7 Days</span>
                            </div>
                            <div class="analytics-chart-wrap">
                                <canvas id="revenueChart"></canvas>
                            </div>
                        </section>

                        <section class="analytics-card">
                            <div class="analytics-section-head">
                                <div>
                                    <h4><i class="fas fa-wallet icon-one"></i> ${__('expenses')}</h4>
                                    <p>${__('expenseHistory')}</p>
                                </div>
                                <div class="analytics-actions">
                                    <button class="btn-small analytics-ghost-btn" id="pdfExpensesBtn"><i class="fas fa-file-pdf"></i> ${__('pdfExpenses')}</button>
                                    <button class="btn-small" id="addExpenseBtn"><i class="fas fa-plus"></i> ${__('addExpense')}</button>
                                </div>
                            </div>
                            <div class="analytics-expense-overview">
                                <div class="analytics-summary-tile">
                                    <div class="analytics-summary-label">${__('totalExpenses')}</div>
                                    <div class="analytics-summary-value">TSh ${totalExpenses.toLocaleString()}</div>
                                </div>
                                <div class="analytics-summary-tile">
                                    <div class="analytics-summary-label">${__('averageExpense')}</div>
                                    <div class="analytics-summary-value">TSh ${averageExpenseValue.toLocaleString()}</div>
                                </div>
                            </div>
                            <div style="display:flex; align-items:center; gap:0.5rem; border-radius:999px; border:1px solid #c2daf5; padding:0.2rem 0.5rem 0.2rem 1rem; background:white;">
                                <i class="fas fa-search" style="color:#94a3b8;"></i>
                                <input type="text" id="expenseSearchInput" placeholder="${__('searchExpense')}" style="width:100%; padding:0.7rem 0; border:none; outline:none;">
                                <button type="button" class="voice-btn voice-mic-btn" data-target="expenseSearchInput" title="Voice search" aria-label="Voice search"><i class="fas fa-microphone"></i> Mic</button>
                            </div>
                            <div class="filter-tabs analytics-filter-tabs">
                                <span class="filter-tab active" data-expense-filter="all">${__('all')}</span>
                                <span class="filter-tab" data-expense-filter="today">${__('today')}</span>
                                <span class="filter-tab" data-expense-filter="week">${__('week')}</span>
                                <span class="filter-tab" data-expense-filter="month">${__('month')}</span>
                            </div>
                            <div id="expensesListContainer" class="analytics-expense-list">
                                ${expenses.length === 0 ? `<div class="analytics-empty-state">${__('noExpenses')}</div>` : ''}
                            </div>
                            ${expenses.length > 0 ? `
                                <button class="btn-small analytics-danger-btn" id="clearExpensesBtn">
                                    <i class="fas fa-trash"></i> ${__('clearExpenses')}
                                </button>
                            ` : ''}
                        </section>
                    </div>
                `;
                
                document.getElementById('mobileContent').innerHTML = html;

                const ctx = document.getElementById('revenueChart')?.getContext('2d');
                if (ctx) {
                    new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: last7Days,
                            datasets: [{
                                label: 'Daily Revenue',
                                data: dailyRevenue,
                                borderColor: '#06c6d4',
                                backgroundColor: 'rgba(27,79,114,0.1)',
                                tension: 0.3,
                                fill: true,
                                pointBackgroundColor: '#fedb9f',
                                pointBorderColor: '#06c6d4',
                                pointRadius: 4
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: { y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' } } }
                        }
                    });
                }

                document.getElementById('pdfAnalyticsBtn')?.addEventListener('click', generateAnalyticsPDF);
                
                // Enhanced Expenses Functionality
                const expenseCategories = [
                    { value: 'utilities', label: __('utilities') },
                    { value: 'rent', label: __('rent') },
                    { value: 'salary', label: __('salary') },
                    { value: 'marketing', label: __('marketing') },
                    { value: 'maintenance', label: __('maintenance') },
                    { value: 'supplies', label: __('supplies') },
                    { value: 'other', label: __('other') }
                ];
                
                let expenseFilterMode = 'all';
                let expenseSearchTerm = '';
                
                const renderExpensesList = () => {
                    const now = new Date();
                    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                    const weekAgo = new Date(today);
                    weekAgo.setDate(weekAgo.getDate() - 7);
                    const monthAgo = new Date(today);
                    monthAgo.setMonth(monthAgo.getMonth() - 1);
                    
                    let filtered = expenses.filter(e => {
                        const expDate = new Date(e.date);
                        let passDateFilter = true;
                        
                        if (expenseFilterMode === 'today') passDateFilter = expDate >= today;
                        else if (expenseFilterMode === 'week') passDateFilter = expDate >= weekAgo;
                        else if (expenseFilterMode === 'month') passDateFilter = expDate >= monthAgo;
                        
                        const passSearch = !expenseSearchTerm || 
                            e.desc?.toLowerCase().includes(expenseSearchTerm.toLowerCase()) ||
                            (e.category && e.category.toLowerCase().includes(expenseSearchTerm.toLowerCase()));
                        
                        return passDateFilter && passSearch;
                    }).sort((a, b) => new Date(b.date) - new Date(a.date));
                    
                    const container = document.getElementById('expensesListContainer');
                    if (!container) return;
                    
                    if (filtered.length === 0) {
                        container.innerHTML = `<div class="analytics-empty-state">${__('noExpenses')}</div>`;
                        return;
                    }
                    
                    let html = '';
                    filtered.forEach(e => {
                        const expDate = new Date(e.date);
                        const dateStr = expDate.toLocaleDateString();
                        const timeStr = expDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                        const catLabel = expenseCategories.find(c => c.value === e.category)?.label || e.category || __('other');
                        
                        html += `
                            <div class="analytics-expense-item">
                                <div class="analytics-expense-head">
                                    <div class="analytics-expense-main">
                                        <div class="analytics-expense-title">${e.desc || 'Expense'}</div>
                                        <div class="analytics-expense-meta">
                                            <span class="analytics-expense-chip">${catLabel}</span>
                                            <span class="analytics-expense-subtle"><i class="far fa-calendar"></i> ${dateStr} ${timeStr}</span>
                                            <span class="analytics-expense-subtle"><i class="fas fa-user"></i> ${e.userName || 'Unknown'}</span>
                                        </div>
                                    </div>
                                    <div class="analytics-expense-side">
                                        <div class="analytics-expense-amount">TSh ${Number(e.amount || 0).toLocaleString()}</div>
                                        <div class="analytics-expense-actions">
                                            <button class="analytics-expense-btn analytics-expense-edit edit-expense-btn" data-expense-id="${e.id}" aria-label="${__('editExpense')}">
                                                <i class="fas fa-edit"></i> Edit
                                            </button>
                                            <button class="analytics-expense-btn analytics-expense-delete delete-expense-btn" data-expense-id="${e.id}" aria-label="${__('deleteExpense')}">
                                                <i class="fas fa-trash"></i> ${__('deleteExpense')}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    
                    container.innerHTML = html;
                    
                    // Attach event listeners
                    document.querySelectorAll('.edit-expense-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.preventDefault();
                            const expId = parseInt(btn.getAttribute('data-expense-id'));
                            const exp = expenses.find(e => e.id === expId);
                            if (exp) showEditExpenseModal(exp);
                        });
                    });
                    
                    document.querySelectorAll('.delete-expense-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.preventDefault();
                            const expId = parseInt(btn.getAttribute('data-expense-id'));
                            if (confirm(__('confirmDelete'))) {
                                expenses = expenses.filter(e => e.id !== expId);
                                saveExpenses();
                                renderAnalysisMobile();
                            }
                        });
                    });
                };
                
                const showEditExpenseModal = (exp) => {
                    showEnhancedModal({
                        title: __('editExpense'),
                        fields: [
                            { name: 'desc', placeholder: __('desc'), type: 'text', value: exp.desc },
                            { name: 'amount', placeholder: __('amount'), type: 'number', value: exp.amount },
                            { name: 'category', type: 'select', options: expenseCategories, value: exp.category || 'other' }
                        ],
                        onConfirm: (data) => {
                            exp.desc = data.desc || 'Expense';
                            exp.amount = parseFloat(data.amount) || 0;
                            exp.category = data.category || 'other';
                            saveExpenses();
                            renderAnalysisMobile();
                            showToast(__('expenses') + ' ' + __('save').toLowerCase());
                        },
                        onDelete: () => {
                            expenses = expenses.filter(e => e.id !== exp.id);
                            saveExpenses();
                            renderAnalysisMobile();
                            showToast(__('expenses') + ' deleted');
                        },
                        showDelete: true
                    });
                };
                
                document.getElementById('addExpenseBtn')?.addEventListener('click', (e) => {
                    e.preventDefault();
                    showEnhancedModal({
                        title: __('addExpense'),
                        fields: [
                            { name: 'desc', placeholder: __('desc'), type: 'text' },
                            { name: 'amount', placeholder: __('amount'), type: 'number' },
                            { name: 'category', type: 'select', options: expenseCategories, value: 'other' }
                        ],
                        onConfirm: (data) => {
                            let amt = parseFloat(data.amount) || 0;
                            expenses.push({
                                id: Date.now(),
                                desc: data.desc || 'Expense',
                                amount: amt,
                                category: data.category || 'other',
                                userId: currentUser?.id || null,
                                userName: currentUser?.name || 'Unknown User',
                                date: new Date().toISOString()
                            });
                            saveExpenses();
                            renderAnalysisMobile();
                            showToast(__('addExpense') + ' ' + __('save').toLowerCase());
                            expenseSearchTerm = '';
                            expenseFilterMode = 'all';
                            document.getElementById('expenseSearchInput').value = '';
                            renderExpensesList();
                        }
                    });
                });
                
                // Filter functionality
                document.querySelectorAll('[data-expense-filter]').forEach(tab => {
                    tab.addEventListener('click', (e) => {
                        e.preventDefault();
                        document.querySelectorAll('[data-expense-filter]').forEach(t => t.classList.remove('active'));
                        tab.classList.add('active');
                        expenseFilterMode = tab.getAttribute('data-expense-filter');
                        renderExpensesList();
                    });
                });
                
                // Search functionality
                document.getElementById('expenseSearchInput')?.addEventListener('input', (e) => {
                    expenseSearchTerm = e.target.value;
                    renderExpensesList();
                });
                
                // Clear all expenses
                document.getElementById('clearExpensesBtn')?.addEventListener('click', (e) => {
                    e.preventDefault();
                    if (confirm('Are you sure you want to clear all expenses?')) {
                        expenses = [];
                        saveExpenses();
                        renderAnalysisMobile();
                        showToast(__('clearExpenses') + ' completed');
                    }
                });
                
                // PDF Export (respects current filter)
                document.getElementById('pdfExpensesBtn')?.addEventListener('click', (e) => {
                    e.preventDefault();
                    
                    // Apply same filtering logic as renderExpensesList
                    const now = new Date();
                    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                    const weekAgo = new Date(today);
                    weekAgo.setDate(weekAgo.getDate() - 7);
                    const monthAgo = new Date(today);
                    monthAgo.setMonth(monthAgo.getMonth() - 1);
                    
                    let filteredExpenses = expenses.filter(e => {
                        const expDate = new Date(e.date);
                        let passDateFilter = true;
                        
                        if (expenseFilterMode === 'today') passDateFilter = expDate >= today;
                        else if (expenseFilterMode === 'week') passDateFilter = expDate >= weekAgo;
                        else if (expenseFilterMode === 'month') passDateFilter = expDate >= monthAgo;
                        
                        const passSearch = !expenseSearchTerm || 
                            e.desc?.toLowerCase().includes(expenseSearchTerm.toLowerCase()) ||
                            (e.category && e.category.toLowerCase().includes(expenseSearchTerm.toLowerCase()));
                        
                        return passDateFilter && passSearch;
                    }).sort((a, b) => new Date(b.date) - new Date(a.date));
                    
                    if (filteredExpenses.length === 0) {
                        showToast('No expenses to export in this filter', 'error');
                        return;
                    }
                    
                    const totalExp = filteredExpenses.reduce((a, e) => a + (e.amount || 0), 0);
                    const avgExp = filteredExpenses.length > 0 ? Math.round(totalExp / filteredExpenses.length) : 0;
                    
                    // Get filter label
                    const filterLabels = {
                        'all': 'All Expenses',
                        'today': 'Today\'s Expenses',
                        'week': 'This Week\'s Expenses',
                        'month': 'This Month\'s Expenses'
                    };
                    const filterLabel = filterLabels[expenseFilterMode] || 'Expense Report';

                    const { doc, pageWidth, startY, meta } = createModernPdfDoc(filterLabel, 'Profit Point | Expense breakdown');
                    let cursorY = startY;

                    if (expenseSearchTerm) {
                        doc.setFont('helvetica', 'bold');
                        doc.setFontSize(9);
                        doc.setTextColor(71, 85, 105);
                        doc.text(`Search filter: ${expenseSearchTerm}`, 14, cursorY - 2);
                    }

                    cursorY = drawPdfMetricCards(doc, cursorY, [
                        {
                            label: 'Total Expenses',
                            value: formatPdfCurrency(totalExp),
                            note: `${filteredExpenses.length} records`,
                            color: [255, 241, 242],
                            border: [254, 205, 211],
                            valueColor: [159, 18, 57]
                        },
                        {
                            label: 'Average Expense',
                            value: formatPdfCurrency(avgExp),
                            note: 'Per entry',
                            color: [255, 251, 235],
                            border: [253, 230, 138],
                            valueColor: [146, 64, 14]
                        },
                        {
                            label: 'Period',
                            value: filterLabel,
                            note: expenseSearchTerm ? 'Search applied' : 'No search filter',
                            color: [240, 249, 255],
                            border: [186, 230, 253],
                            valueColor: [12, 74, 110]
                        }
                    ]);

                    cursorY = ensurePdfSpace(doc, cursorY, 20);
                    doc.setFont('helvetica', 'bold');
                    doc.setFontSize(12);
                    doc.setTextColor(17, 24, 39);
                    doc.text('Expense Entries', 14, cursorY);

                    const expenseRows = filteredExpenses.map(e => {
                        const date = new Date(e.date).toLocaleDateString();
                        const cat = expenseCategories.find(c => c.value === e.category)?.label || e.category || 'Other';
                        return [date, e.desc || '-', cat, formatPdfCurrency(e.amount), e.userName || 'Unknown'];
                    });

                    const finalY = drawStyledPdfTable(doc, {
                        head: [['Date', 'Description', 'Category', 'Amount', 'User']],
                        body: expenseRows,
                        startY: cursorY + 2,
                        columnStyles: {
                            3: { halign: 'right', cellWidth: 34 }
                        }
                    });

                    const noteY = ensurePdfSpace(doc, finalY + 8, 10);
                    doc.setFont('helvetica', 'normal');
                    doc.setFontSize(9);
                    doc.setTextColor(100, 116, 139);
                    doc.text(`Total exported: ${formatPdfCurrency(totalExp)}`, 14, noteY);
                    doc.text(`Average: ${formatPdfCurrency(avgExp)}`, pageWidth - 14, noteY, { align: 'right' });
                    
                    const fileName = `expenses-${expenseFilterMode}-${new Date().toISOString().slice(0, 10)}.pdf`;
                    finalizeModernPdfDoc(doc, meta);
                    doc.save(fileName);
                    showToast('Expense report exported');
                });
                
                // Initial render
                renderExpensesList();
            }

            // ==================== SALES PAGE ====================
            function renderSalesMobile() {
                let filter = currentSalesFilter || 'all';
                let filteredSales = [...sales].sort((a, b) => new Date(b.date) - new Date(a.date));
                let searchTerm = '';
                
                const filterSales = () => {
                    const now = new Date();
                    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                    const weekAgo = new Date(today);
                    weekAgo.setDate(weekAgo.getDate() - 7);
                    const monthAgo = new Date(today);
                    monthAgo.setMonth(monthAgo.getMonth() - 1);
                    
                    let result = filteredSales;
                    if (filter === 'today') result = filteredSales.filter(s => new Date(s.date) >= today);
                    if (filter === 'week') result = filteredSales.filter(s => new Date(s.date) >= weekAgo);
                    if (filter === 'month') result = filteredSales.filter(s => new Date(s.date) >= monthAgo);
                    if (searchTerm) {
                        const lowered = searchTerm.toLowerCase();
                        result = result.filter(sale => (
                            String(sale.receiptNumber || '').toLowerCase().includes(lowered) ||
                            String(sale.customerName || '').toLowerCase().includes(lowered) ||
                            String(sale.userName || '').toLowerCase().includes(lowered) ||
                            (sale.items || []).some(item => String(item.name || '').toLowerCase().includes(lowered))
                        ));
                    }
                    return result;
                };
                
                const renderSalesContent = () => {
                    const displaySales = filterSales();
                    const totalAmount = displaySales.reduce((sum, s) => sum + s.finalTotal, 0);
                    const filterLabel = filter === 'all' ? __('all') : __(filter);
                    
                    let html = `
                        <div class="sales-card">
                            <div class="sales-header-row">
                                <div class="sales-title-row">
                                    <div class="sales-title-block">
                                        <h3><i class="fas fa-history icon-one"></i> ${__('salesHistory')}</h3>
                                        <div class="sales-header-meta">${displaySales.length} ${__('transactions')}</div>

                            <div class="filter-tabs">
                                <span class="filter-tab ${filter === 'all' ? 'active' : ''}" data-filter="all">${__('all')}</span>
                                <span class="filter-tab ${filter === 'today' ? 'active' : ''}" data-filter="today">${__('today')}</span>
                                <span class="filter-tab ${filter === 'week' ? 'active' : ''}" data-filter="week">${__('week')}</span>

                                <i class="fas fa-search" style="color:#94a3b8;"></i>

                            <div style="background:#f8fafc; border-radius:40px; padding:1rem; margin:1rem 0; text-align:center;">

                            </div>
                            
                            ${displaySales.length === 0 ? 
                                `<p style="text-align:center; color:#64748b; padding:2rem;">No sales found</p>` : 
                                displaySales.map(sale => {

                                    const timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                                    const productNames = sale.items.map(i => i.name).join(', ');
                                    
                                    return `

                                                        <i class="far fa-calendar"></i> ${dateStr} ${timeStr}
                                                    </span>
                                                    <span class="sale-payment">${sale.payment || 'Cash'}</span>
                                                    <span style="background:rgba(6,198,212,0.15); color:#06c6d4; padding:0.3rem 0.8rem; border-radius:40px; font-size:0.75rem; font-weight:600;"><i class="fas fa-user icon-one"></i> ${sale.userName || 'Unknown'}</span>
                                                    <span style="background:rgba(15,23,42,0.08); color:#0f172a; padding:0.3rem 0.8rem; border-radius:40px; font-size:0.75rem; font-weight:700;"><i class="fas fa-circle-notch icon-one"></i> ${sale.paymentStatus || 'paid'}</span>
                                                </div>
                                                <div class="sale-products">${sale.receiptNumber || sale.id} · ${productNames.substring(0, 50)}${productNames.length > 50 ? '...' : ''}</div>
                                                <div style="font-size:0.78rem; color:#64748b; margin-top:0.35rem;">${sale.customerName ? `Customer: ${sale.customerName}` : 'Walk-in'}${sale.outstandingAmount > 0 ? ` · Due ${formatMoney(sale.outstandingAmount)}` : ''}</div>
                                                <div style="display:flex; gap:0.45rem; margin-top:0.55rem; flex-wrap:wrap;">

                            e.preventDefault();
                            filter = tab.dataset.filter;
                            currentSalesFilter = tab.dataset.filter;
                            renderSalesContent();
                        });
                    });
                    document.getElementById('salesSearchInput')?.addEventListener('input', event => {
                        searchTerm = event.target.value;
                        renderSalesContent();
                    });
                    document.getElementById('pdfSalesBtn')?.addEventListener('click', generateSalesPDF);
                    document.getElementById('clearSalesBtn')?.addEventListener('click', () => {
                        if(confirm('Delete all sales?')) {
                            sales = [];
                            saveSales();
                            renderSalesContent();
                            showToast('Sales cleared');
                        }
                    });
                    document.querySelectorAll('.receipt-btn').forEach(button => {

                            const sale = sales.find(item => String(item.id) === String(button.dataset.id));
                            if (!sale) return;
                            showReceiptModal(sale);
                        });
                    });
                    document.querySelectorAll('.refund-btn').forEach(button => {

                                showToast('Refund could not be processed', 'error');

                            }
                            renderSalesContent();
                            showToast('Refund processed');
                        });
                    });

                            const outstanding = Number(button.dataset.outstanding);
                            showEnhancedModal({
                                title: 'Record credit payment',
                                fields: [
                                    { name: 'amount', type: 'number', placeholder: `Outstanding: ${formatMoney(outstanding)}`, value: outstanding }

                                    const paid = recordCreditPayment(saleId, amount);
                                    showToast(`Payment of ${formatMoney(paid)} recorded`);
                                    renderSalesContent();
                                }
                            });
                        });
                    });
                };
                
                renderSalesContent();
            }

                                return `

            // ==================== USERS PAGE ====================
            function renderUsersMobile() {
                if (!isManager()) return;

                const cashierStats = users.map(user => {
                    const userSales = sales.filter(sale => !sale.isReturn && String(sale.userId) === String(user.id));
                    return {
                        id: user.id,
                        salesCount: userSales.length,
                        salesTotal: userSales.reduce((sum, sale) => sum + Number(sale.finalTotal || 0), 0)
                    };
                });
                
                let html = `
                    <div style="background:white; border-radius:40px; padding:1.4rem;">
                        <h3 style="margin-bottom:1rem;"><i class="fas fa-users icon-one"></i> ${__('userTitle')}</h3>
                `;
                
                users.forEach(u => {
                    const stat = cashierStats.find(item => item.id === u.id) || { salesCount: 0, salesTotal: 0 };
                    let avatarHtml = u.profileImage ? 
                        `<img src="${u.profileImage}" style="width:100%; height:100%; object-fit:cover;">` : 
                        '<i class="fas fa-user" style="font-size:1.2rem;"></i>';
                    
                    html += `
                        <div class="user-row">
                            <div class="user-avatar">${avatarHtml}</div>
                            <div class="user-info" style="flex:1;">
                                <div><strong>${u.name}</strong></div>
                                <div style="font-size:0.8rem; color:#64748b;">@${u.username} · ${u.role}</div>
                                ${u.phone ? `<div style="font-size:0.75rem; color:#06c6d4;"><i class="fas fa-phone icon-one"></i> ${u.phone}</div>` : ''}
                                <div style="font-size:0.75rem; color:#64748b;"><i class="fas fa-chart-line icon-one"></i> ${stat.salesCount} sales · ${formatMoney(stat.salesTotal)}</div>
                            </div>
                            <div class="user-actions" style="display:flex; gap:0.45rem; align-items:center;">
                                <button class="user-action-btn user-edit-btn" data-userid="${u.id}" title="Edit ${u.name}" aria-label="Edit ${u.name}"><i class="fas fa-edit icon-one"></i> Edit</button>
                                ${u.id !== currentUser.id ? 
                                    `<button class="user-action-btn danger user-delete-btn" data-userid="${u.id}" title="Delete ${u.name}" aria-label="Delete ${u.name}"><i class="fas fa-trash-alt icon-danger"></i> Delete</button>` : 
                                    ''}
                            </div>
                        </div>
                    `;
                });
                
                html += `
                        <button class="btn-small" id="addUserBtn" style="width:100%; margin-top:1rem;">
                            <i class="fas fa-user-plus"></i> ${__('addUser')}
                        </button>
                    </div>
                `;
                
                document.getElementById('mobileContent').innerHTML = html;
                
                document.getElementById('addUserBtn').addEventListener('click', () => {
                    showEnhancedModal({
                        title: __('newUser'),
                        withImage: true,
                        imageLabel: __('profileImage'),
                        fields: [
                            { name: 'fullName', placeholder: __('fullName') },
                            { name: 'username', placeholder: __('username') },
                            { name: 'password', placeholder: __('password'), type: 'password' },
                            { name: 'role', type: 'select', options: [{ value: 'teller', label: __('teller') }, { value: 'manager', label: __('manager') }] },
                            { name: 'phone', placeholder: __('phoneNumber') }
                        ],
                        onConfirm: (data) => {
                            if (!data.username || !data.password) {
                                showToast('Required fields missing', 'error');
                                return;
                            }
                            
                            const newUser = {
                                id: 'u' + Date.now(),
                                username: data.username,
                                password: data.password,
                                role: data.role,
                                name: data.fullName || data.username,
                                phone: data.phone || '',
                                profileImage: data.image || null,
                                createdAt: new Date().toISOString()
                            };
                            
                            users.push(newUser);
                            saveUsers();
                            renderUsersMobile();
                            showToast('User added');
                        }
                    });
                });
                
                document.querySelectorAll('.user-edit-btn').forEach(icon => {
                    icon.addEventListener('click', () => {
                        let uid = icon.dataset.userid;
                        let user = users.find(u => u.id === uid);
                        if (!user) return;
                        
                        showEnhancedModal({
                            title: __('editUser'),
                            withImage: true,
                            imageLabel: __('profileImage'),
                            fields: [
                                { name: 'fullName', value: user.name },
                                { name: 'username', value: user.username },
                                { name: 'password', placeholder: __('password'), type: 'password', value: user.password },
                                { name: 'role', type: 'select', options: [{ value: 'teller', label: __('teller') }, { value: 'manager', label: __('manager') }], value: user.role },
                                { name: 'phone', value: user.phone || '' }
                            ],
                            showDelete: true,
                            onDelete: () => {
                                if (user.id === currentUser.id) {
                                    showToast('Cannot delete yourself', 'error');
                                    return;
                                }
                                users = users.filter(u => u.id !== uid);
                                saveUsers();
                                renderUsersMobile();
                                showToast('User deleted');
                            },
                            onConfirm: (data) => {
                                user.name = data.fullName || user.name;
                                user.username = data.username;
                                if (data.password) user.password = data.password;
                                user.role = data.role;
                                user.phone = data.phone || '';
                                if (data.image) user.profileImage = data.image;
                                saveUsers();
                                // Sync currentUser if the edited user is the logged-in user
                                if (user.id === currentUser.id) {
                                    currentUser = { ...currentUser, ...user };
                                    localStorage.setItem(AUTH_KEY, JSON.stringify(currentUser));
                                    renderPhoneApp();
                                }
                                renderUsersMobile();
                                showToast('User updated');
                            }
                        });
                    });
                });
                
                document.querySelectorAll('.user-delete-btn').forEach(icon => {
                    icon.addEventListener('click', () => {
                        let uid = icon.dataset.userid;
                        let user = users.find(u => u.id === uid);
                        if (!user) return;
                        
                        if (user.id === currentUser.id) {
                            showToast('Cannot delete yourself', 'error');
                            return;
                        }
                        
                        if (confirm(__('confirmDelete'))) {
                            users = users.filter(u => u.id !== uid);
                            saveUsers();
                            renderUsersMobile();
                            showToast('User deleted');
                        }
                    });
                });
            }

            // ==================== FULLSCREEN TOGGLE (NEW) ====================
            async function requestAppFullscreen() {
                if (document.fullscreenElement || !shouldAutoFullscreen || !document.documentElement.requestFullscreen) return;
                try {
                    await document.documentElement.requestFullscreen();
                } catch {
                    // Browsers can reject fullscreen until a user gesture is available.
                }
            }

            function bindAutoFullscreen() {
                if (autoFullscreenListenersBound) return;
                autoFullscreenListenersBound = true;
                const tryEnterFullscreen = () => {
                    if (shouldAutoFullscreen && !document.fullscreenElement) {
                        requestAppFullscreen();
                    }
                };
                document.addEventListener('pointerdown', tryEnterFullscreen, true);
                document.addEventListener('touchstart', tryEnterFullscreen, true);
                document.addEventListener('keydown', tryEnterFullscreen, true);
            }

            function toggleFullscreen() {
                if (!document.fullscreenElement) {
                    shouldAutoFullscreen = true;
                    saveFullscreenPreference();
                    requestAppFullscreen();
                } else if (document.exitFullscreen) {
                    shouldAutoFullscreen = false;
                    saveFullscreenPreference();
                    document.exitFullscreen();
                }
            }

            // ==================== RENDER PHONE APP (header improved) ====================
            function renderPhoneApp() {
                const container = document.getElementById('phoneApp');
                
                const logoHtml = shopBrand.logo?.startsWith('data:image') ? 
                    `<img src="${shopBrand.logo}" style="width:100%; height:100%; object-fit:cover;">` : 
                    (shopBrand.logo?.startsWith('http') ? 
                        `<img src="${shopBrand.logo}" style="width:100%; height:100%; object-fit:cover;">` : 
                        `<span style="font-size:2rem;">${shopBrand.logo || '💎'}</span>`);
                
                const userAvatarHtml = currentUser.profileImage ? 
                    `<img src="${currentUser.profileImage}" style="width:100%; height:100%; object-fit:cover;">` : 
                    '<i class="fas fa-user-circle" style="font-size:1.6rem;"></i>';
                
                container.innerHTML = `
                    <div class="wallpaper-container"><img class="wallpaper-image" src="${wallpaperImage}" style="opacity:${wallpaperOpacity}"></div>
                    
                    <div class="app-header">
                        <div class="header-top-row">
                            <div class="header-brand-section" id="shopLogoBtn" title="${shopBrand.name}">
                                <span class="shop-logo-preview">${logoHtml}</span>
                                <span class="shop-name-display">${shopBrand.name}</span>
                            </div>
                            <div class="header-actions">
                                <div class="three-dot-menu-wrap" style="position:relative;">

                                        <i class="fas fa-ellipsis-v"></i> Options
                                    </button>
                                    <div id="threeDotDropdown" style="display:none;position:absolute;top:calc(100% + 8px);right:0;background:#fff;border:1px solid #e2e8f0;border-radius:16px;box-shadow:0 12px 40px rgba(0,0,0,0.16);min-width:200px;max-width:calc(100vw - 2rem);z-index:9999;overflow:hidden;">
                                        <button class="three-dot-item" id="tdProfileBtn"><span style="width:28px;height:28px;border-radius:8px;overflow:hidden;display:inline-flex;align-items:center;justify-content:center;background:#06c6d4;flex-shrink:0;">${userAvatarHtml}</span> ${currentUser.name}</button>
                                        <div style="height:1px;background:#e2e8f0;margin:0.2rem 0;"></div>
                                        <button class="three-dot-item" id="tdLangToggle"><i class="fas fa-globe icon-one"></i> Language (${currentLang === 'sw' ? 'Kiswahili' : 'English'})</button>
                                        <button class="three-dot-item" id="tdSettingsBtn"><i class="fas fa-cog icon-one"></i> Settings</button>
                                        <button class="three-dot-item" id="tdManualBtn"><i class="fas fa-book icon-one"></i> Manual & Instructions</button>
                                        <button class="three-dot-item" id="tdFullscreenBtn"><i id="fsIcon" class="fas ${document.fullscreenElement ? 'fa-compress' : 'fa-expand'} icon-one"></i> <span id="fsText">${document.fullscreenElement ? 'Exit' : 'Full'}</span></button>
                                        <div style="height:1px;background:#e2e8f0;margin:0.2rem 0;"></div>
                                        <button class="three-dot-item" id="tdLogoutBtn" style="color:#dc2626;"><i class="fas fa-sign-out-alt"></i> Logout</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="main-content" id="mobileContent"></div>
                    
                    <div class="bottom-nav" id="bottomNav">
                        <div class="nav-item-mobile" data-page="pos"><i class="fas fa-cash-register"></i><span>${__('pos')}</span></div>
                        <div class="nav-item-mobile" data-page="products"><i class="fas fa-cubes"></i><span>${__('products')}</span></div>
                        <div class="nav-item-mobile" data-page="analysis"><i class="fas fa-chart-pie"></i><span>${__('analysis')}</span></div>
                        <div class="nav-item-mobile" data-page="sales"><i class="fas fa-history"></i><span>${__('sales')}</span></div>
                        <div class="nav-item-mobile" data-page="alerts"><i class="fas fa-bell"></i><span>${__('alerts')}</span></div>
                        ${isManager() ? `<div class="nav-item-mobile" data-page="users"><i class="fas fa-users"></i><span>${__('users')}</span></div>` : ''}
                    </div>
                `;
                
                document.getElementById('tdProfileBtn').addEventListener('click', () => {
                    closeDropdown();
                    showUserProfileModal();
                });

                // 3-dot menu
                const threeDotBtn = document.getElementById('threeDotMenuBtn');
                const threeDotDropdown = document.getElementById('threeDotDropdown');
                const closeDropdown = () => { threeDotDropdown.style.display = 'none'; };
                threeDotBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const isOpen = threeDotDropdown.style.display === 'block';
                    threeDotDropdown.style.display = isOpen ? 'none' : 'block';
                    if (!isOpen) updateFsLabel();
                });
                document.addEventListener('click', closeDropdown);

                document.getElementById('tdLangToggle').addEventListener('click', () => {
                    closeDropdown();
                    currentLang = currentLang === 'sw' ? 'en' : 'sw';

                    closeDropdown();

                });

                    closeDropdown();
                    showManualModal();
                });
                const updateFsLabel = () => {
                    const inFs = !!document.fullscreenElement;
                    const fsText = document.getElementById('fsText');
                    const fsIcon = document.getElementById('fsIcon');
                    if (fsText) fsText.innerText = inFs ? 'Exit' : 'Full';
                    if (fsIcon) { fsIcon.className = `fas ${inFs ? 'fa-compress' : 'fa-expand'} icon-one`; }
                };
                document.getElementById('tdFullscreenBtn').addEventListener('click', () => {
                    closeDropdown();
                    toggleFullscreen();
                    setTimeout(updateFsLabel, 80);
                });
                document.addEventListener('fullscreenchange', updateFsLabel);
                document.getElementById('tdLogoutBtn').addEventListener('click', () => {
                    closeDropdown();
                    logout();
                });
                bindAutoFullscreen();
                requestAppFullscreen();
                
                document.querySelectorAll('.nav-item-mobile').forEach(item => {
                    item.addEventListener('click', (e) => {
                        e.preventDefault();
                        document.querySelectorAll('.nav-item-mobile').forEach(n => n.classList.remove('active'));

                        renderMobilePage(currentPage);
                    });

                renderMobilePage(currentPage);
                applyButtonLabels(container);

            // ==================== RENDER MOBILE PAGE ====================
            function renderMobilePage(page) {
                if (page === 'pos') renderPosMobile();
                else if (page === 'products') renderProductsMobile();
                else if (page === 'analysis') renderAnalysisMobile();
                else if (page === 'sales') renderSalesMobile();
                else if (page === 'alerts') renderAlertsMobile();
                else if (page === 'users' && isManager()) renderUsersMobile();
            }

            // ==================== GLOBAL VOICE MIC DELEGATION ====================
            document.addEventListener('click', (e) => {
                const btn = e.target.closest('.voice-mic-btn');
                if (!btn) return;
                const targetId = btn.dataset.target;
                if (targetId) startVoiceInput(targetId, btn);
            });

            // ==================== START APP ====================
            function completeStartup() {
                ensureButtonLabelObserver();
                applyButtonLabels(document);
                registerPwaHooks();
                if (!getLicense()) {
                    saveLicense({ type: 'trial', start: Date.now(), duration: TRIAL_DURATION });
                }
                
                if (isLicenseExpired() && getLicense()?.type === 'trial') {
                    showProductKeyModal(true);
                    startLicenseMonitoring();
                } else if (!currentUser) {
                    showAuthScreen();
                    startLicenseMonitoring();
                } else {
                    renderPhoneApp();
                    startLicenseMonitoring();
                }
            }

            setTimeout(() => {
                if (!splash) {
                    completeStartup();
                    return;
                }
                splash.classList.add('is-exiting');
                setTimeout(() => {
                    splash.style.display = 'none';
                    completeStartup();
                }, SPLASH_EXIT_DURATION);
            }, SPLASH_ACTIVE_DURATION);
        })();
    </script>
</body>
</html>
