            // ==================== PDF GENERATORS ====================
            function formatPdfCurrency(value) {
                return `TSh ${Number(value || 0).toLocaleString()}`;
            }

            function getPdfLogoPayload() {
                const logo = shopBrand?.logo;
                if (typeof logo === 'string' && logo.startsWith('data:image/')) {
                    const match = logo.match(/^data:image\/(png|jpeg|jpg);/i);
                    if (match) {
                        const format = match[1].toLowerCase() === 'png' ? 'PNG' : 'JPEG';
                        return { type: 'image', src: logo, format };
                    }
                }
                const fallbackText = (shopBrand?.name || 'Profit Point').trim().charAt(0).toUpperCase() || 'P';
                return { type: 'text', text: fallbackText };
            }

            function drawModernPdfHeader(doc, meta) {
                const pageWidth = doc.internal.pageSize.getWidth();
                const logo = getPdfLogoPayload();
                const logoX = 14;
                const logoY = 6;
                const logoSize = 16;

                doc.setFillColor(11, 37, 64);
                doc.rect(0, 0, pageWidth, 30, 'F');
                doc.setFillColor(6, 198, 212);
                doc.rect(0, 30, pageWidth, 2, 'F');

                doc.setFillColor(255, 255, 255);
                doc.roundedRect(logoX, logoY, logoSize, logoSize, 3, 3, 'F');
                if (logo.type === 'image') {
                    try {
                        doc.addImage(logo.src, logo.format, logoX + 1, logoY + 1, logoSize - 2, logoSize - 2);
                    } catch (err) {
                        doc.setTextColor(11, 37, 64);
                        doc.setFont('helvetica', 'bold');
                        doc.setFontSize(12);
                        doc.text((shopBrand?.name || 'P').charAt(0).toUpperCase(), logoX + (logoSize / 2), logoY + 10.8, { align: 'center' });
                    }
                } else {
                    doc.setTextColor(11, 37, 64);
                    doc.setFont('helvetica', 'bold');
                    doc.setFontSize(12);
                    doc.text(logo.text, logoX + (logoSize / 2), logoY + 10.8, { align: 'center' });
                }

                doc.setTextColor(255, 255, 255);
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(16);
                doc.text(meta.title, 34, 13);

                doc.setFont('helvetica', 'normal');
                doc.setFontSize(9.5);
                doc.setTextColor(219, 236, 245);
                if (meta.subtitle) {
                    doc.text(meta.subtitle, 34, 20);
                }

                doc.setTextColor(210, 234, 245);
                doc.setFontSize(8.7);
                doc.text(meta.generatedAt, pageWidth - 14, 20, { align: 'right' });
                doc.setTextColor(17, 24, 39);
            }

            function drawModernPdfFooter(doc, pageNumber, pageCount) {
                const pageWidth = doc.internal.pageSize.getWidth();
                const pageHeight = doc.internal.pageSize.getHeight();

                doc.setDrawColor(226, 232, 240);
                doc.setLineWidth(0.25);
                doc.line(14, pageHeight - 12, pageWidth - 14, pageHeight - 12);

                doc.setFont('helvetica', 'normal');
                doc.setFontSize(8.5);
                doc.setTextColor(100, 116, 139);
                doc.text(shopBrand?.name || 'Profit Point', 14, pageHeight - 7);
                doc.text(`Page ${pageNumber} of ${pageCount}`, pageWidth - 14, pageHeight - 7, { align: 'right' });
            }

            function finalizeModernPdfDoc(doc, meta) {
                const totalPages = doc.internal.getNumberOfPages();
                for (let page = 1; page <= totalPages; page++) {
                    doc.setPage(page);
                    drawModernPdfHeader(doc, meta);
                    drawModernPdfFooter(doc, page, totalPages);
                }
                doc.setPage(totalPages);
            }

            function createModernPdfDoc(title, subtitle) {
                if (!window.jspdf) throw new Error('PDF library not loaded. Please check your internet connection and reload.');
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const pageWidth = doc.internal.pageSize.getWidth();

                const meta = {
                    title: title || 'Report',
                    subtitle: subtitle || '',
                    generatedAt: `Generated: ${new Date().toLocaleDateString()} ${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`
                };

                drawModernPdfHeader(doc, meta);
                return { doc, pageWidth, pageHeight: doc.internal.pageSize.getHeight(), startY: 40, meta };
            }

            function ensurePdfSpace(doc, cursorY, neededHeight) {
                const pageHeight = doc.internal.pageSize.getHeight();
                if (cursorY + neededHeight > pageHeight - 14) {
                    doc.addPage();
                    return 40;
                }
                return cursorY;
            }

            function drawPdfMetricCards(doc, startY, cards) {
                const pageWidth = doc.internal.pageSize.getWidth();
                const marginX = 14;
                const gapX = 4;
                const gapY = 4;
                const cols = 3;
                const cardHeight = 21;
                const cardWidth = (pageWidth - (marginX * 2) - (gapX * (cols - 1))) / cols;

                cards.forEach((card, index) => {
                    const row = Math.floor(index / cols);
                    const col = index % cols;
                    const x = marginX + (col * (cardWidth + gapX));
                    const y = startY + (row * (cardHeight + gapY));
                    const fill = card.color || [245, 248, 252];
                    const border = card.border || [220, 229, 238];
                    const valueColor = card.valueColor || [17, 24, 39];

                    doc.setFillColor(fill[0], fill[1], fill[2]);
                    doc.setDrawColor(border[0], border[1], border[2]);
                    doc.setLineWidth(0.3);
                    doc.roundedRect(x, y, cardWidth, cardHeight, 3, 3, 'FD');

                    doc.setFont('helvetica', 'bold');
                    doc.setFontSize(7.5);
                    doc.setTextColor(100, 116, 139);
                    doc.text(String(card.label || ''), x + 2.8, y + 5.7, { maxWidth: cardWidth - 5.6 });

                    doc.setFont('helvetica', 'bold');
                    doc.setFontSize(10.5);
                    doc.setTextColor(valueColor[0], valueColor[1], valueColor[2]);
                    doc.text(String(card.value || '-'), x + 2.8, y + 12.4, { maxWidth: cardWidth - 5.6 });

                    if (card.note) {
                        doc.setFont('helvetica', 'normal');
                        doc.setFontSize(7.2);
                        doc.setTextColor(120, 134, 151);
                        doc.text(String(card.note), x + 2.8, y + 17.6, { maxWidth: cardWidth - 5.6 });
                    }
                });

                const rows = Math.ceil(cards.length / cols) || 1;
                return startY + (rows * cardHeight) + ((rows - 1) * gapY) + 6;
            }

            function drawStyledPdfTable(doc, config) {
                const defaults = {
                    startY: 20,
                    margin: { left: 14, right: 14, top: 40, bottom: 14 },
                    theme: 'grid',
                    headStyles: {
                        fillColor: [11, 37, 64],
                        textColor: [255, 255, 255],
                        fontStyle: 'bold',
                        fontSize: 9
                    },
                    styles: {
                        font: 'helvetica',
                        fontSize: 8.5,
                        cellPadding: 2.2,
                        textColor: [31, 41, 55],
                        lineColor: [226, 232, 240],
                        lineWidth: 0.2
                    },
                    alternateRowStyles: { fillColor: [247, 250, 252] }
                };

                const tableConfig = {
                    ...defaults,
                    ...config,
                    headStyles: { ...defaults.headStyles, ...(config.headStyles || {}) },
                    styles: { ...defaults.styles, ...(config.styles || {}) },
                    alternateRowStyles: { ...defaults.alternateRowStyles, ...(config.alternateRowStyles || {}) }
                };

                doc.autoTable(tableConfig);
                return doc.lastAutoTable ? doc.lastAutoTable.finalY : tableConfig.startY;
            }

            function createAnalyticsLineChartImage(labels, values) {
                const canvas = document.createElement('canvas');
                canvas.width = 900;
                canvas.height = 360;
                const ctx = canvas.getContext('2d');
                if (!ctx) return null;

                const left = 70;
                const right = 860;
                const top = 35;
                const bottom = 300;
                const width = right - left;
                const height = bottom - top;
                const maxValue = Math.max(...values, 1);
                const toShort = (num) => {
                    if (num >= 1000000) return `${(num / 1000000).toFixed(1)}M`;
                    if (num >= 1000) return `${(num / 1000).toFixed(1)}k`;
                    return `${Math.round(num)}`;
                };

                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.strokeStyle = '#e2e8f0';
                ctx.lineWidth = 1;
                for (let i = 0; i <= 4; i++) {
                    const y = top + (height / 4) * i;
                    ctx.beginPath();
                    ctx.moveTo(left, y);
                    ctx.lineTo(right, y);
                    ctx.stroke();

                    const value = Math.round(maxValue * (1 - (i / 4)));
                    ctx.fillStyle = '#64748b';
                    ctx.font = '12px Inter, Arial';
                    ctx.textAlign = 'right';
                    ctx.fillText(toShort(value), left - 10, y + 4);
                }

                ctx.strokeStyle = '#cbd5e1';
                ctx.beginPath();
                ctx.moveTo(left, bottom);
                ctx.lineTo(right, bottom);
                ctx.stroke();

                const stepX = values.length > 1 ? width / (values.length - 1) : width;
                const points = values.map((v, i) => ({
                    x: left + (i * stepX),
                    y: bottom - ((v / maxValue) * height)
                }));

                const gradient = ctx.createLinearGradient(0, top, 0, bottom);
                gradient.addColorStop(0, 'rgba(6,198,212,0.35)');
                gradient.addColorStop(1, 'rgba(6,198,212,0.02)');

                ctx.beginPath();
                points.forEach((p, i) => {
                    if (i === 0) ctx.moveTo(p.x, p.y);
                    else ctx.lineTo(p.x, p.y);
                });
                ctx.lineTo(points[points.length - 1].x, bottom);
                ctx.lineTo(points[0].x, bottom);
                ctx.closePath();
                ctx.fillStyle = gradient;
                ctx.fill();

                ctx.beginPath();
                points.forEach((p, i) => {
                    if (i === 0) ctx.moveTo(p.x, p.y);
                    else ctx.lineTo(p.x, p.y);
                });
                ctx.strokeStyle = '#06c6d4';
                ctx.lineWidth = 3;
                ctx.stroke();

                points.forEach((p, i) => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.fill();
                    ctx.strokeStyle = '#0d4765';
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    ctx.fillStyle = '#334155';
                    ctx.font = '12px Inter, Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(labels[i] || '', p.x, bottom + 18);
                });

                return canvas.toDataURL('image/png');
            }

            function createAnalyticsPieChartImage(series) {
                const canvas = document.createElement('canvas');
                canvas.width = 900;
                canvas.height = 360;
                const ctx = canvas.getContext('2d');
                if (!ctx) return null;

                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                const colors = ['#06c6d4', '#0d4765', '#f59e0b', '#8b5cf6', '#ef4444', '#22c55e'];
                const pieCenterX = 190;
                const pieCenterY = 180;
                const radius = 112;
                const donutHole = 58;
                const data = Array.isArray(series) ? series.slice(0, 6) : [];
                const total = data.reduce((sum, item) => sum + (item.qty || 0), 0);

                if (total <= 0) {
                    ctx.beginPath();
                    ctx.arc(pieCenterX, pieCenterY, radius, 0, Math.PI * 2);
                    ctx.fillStyle = '#e2e8f0';
                    ctx.fill();
                } else {
                    let angle = -Math.PI / 2;
                    data.forEach((item, index) => {
                        const slice = ((item.qty || 0) / total) * Math.PI * 2;
                        ctx.beginPath();
                        ctx.moveTo(pieCenterX, pieCenterY);
                        ctx.arc(pieCenterX, pieCenterY, radius, angle, angle + slice);
                        ctx.closePath();
                        ctx.fillStyle = colors[index % colors.length];
                        ctx.fill();
                        angle += slice;
                    });
                }

                ctx.beginPath();
                ctx.arc(pieCenterX, pieCenterY, donutHole, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();

                ctx.fillStyle = '#0f172a';
                ctx.font = 'bold 24px Inter, Arial';
                ctx.textAlign = 'center';
                ctx.fillText(total > 0 ? `${total}` : '0', pieCenterX, pieCenterY - 4);
                ctx.fillStyle = '#64748b';
                ctx.font = '12px Inter, Arial';
                ctx.fillText('units sold', pieCenterX, pieCenterY + 16);

                const legendData = total > 0 ? data : [{ name: 'No sales data', qty: 0 }];
                legendData.forEach((item, index) => {
                    const legendY = 80 + (index * 36);
                    const color = total > 0 ? colors[index % colors.length] : '#94a3b8';
                    const pct = total > 0 ? (((item.qty || 0) / total) * 100).toFixed(1) : '0.0';
                    const label = total > 0
                        ? `${item.name} (${item.qty} | ${pct}%)`
                        : `${item.name}`;

                    ctx.fillStyle = color;
                    ctx.fillRect(390, legendY, 16, 16);

                    ctx.fillStyle = '#1e293b';
                    ctx.font = '13px Inter, Arial';
                    ctx.textAlign = 'left';
                    ctx.fillText(label.substring(0, 46), 416, legendY + 13);
                });

                return canvas.toDataURL('image/png');
            }

            function generateSalesPDF() {
                const activeFilter = currentSalesFilter || 'all';
                let filteredSales = [...sales].sort((a, b) => new Date(b.date) - new Date(a.date));
                
                // Apply filter based on currentSalesFilter
                if (activeFilter !== 'all') {
                    const now = new Date();
                    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                    const weekAgo = new Date(today);
                    weekAgo.setDate(weekAgo.getDate() - 7);
                    const monthAgo = new Date(today);
                    monthAgo.setMonth(monthAgo.getMonth() - 1);
                    
                    if (activeFilter === 'today') {
                        filteredSales = filteredSales.filter(s => new Date(s.date) >= today);
                    } else if (activeFilter === 'week') {
                        filteredSales = filteredSales.filter(s => new Date(s.date) >= weekAgo);
                    } else if (activeFilter === 'month') {
                        filteredSales = filteredSales.filter(s => new Date(s.date) >= monthAgo);
                    }
                }
                
                let filterLabel = 'All Time';
                if (activeFilter === 'today') filterLabel = 'Today';
                else if (activeFilter === 'week') filterLabel = 'This Week';
                else if (activeFilter === 'month') filterLabel = 'This Month';
                
                const totalAmount = filteredSales.reduce((sum, s) => sum + (s.finalTotal || 0), 0);
                const avgOrder = filteredSales.length ? Math.round(totalAmount / filteredSales.length) : 0;
                const paymentCount = filteredSales.reduce((acc, sale) => {
                    const key = sale.payment || 'N/A';
                    acc[key] = (acc[key] || 0) + 1;
                    return acc;
                }, {});
                const topPayment = Object.entries(paymentCount).sort((a, b) => b[1] - a[1])[0];

                const { doc, pageWidth, startY, meta } = createModernPdfDoc('Sales Report', `Profit Point | ${filterLabel}`);
                let cursorY = drawPdfMetricCards(doc, startY, [
                    {
                        label: 'Transactions',
                        value: `${filteredSales.length}`,
                        note: 'Sales entries',
                        color: [240, 249, 255],
                        border: [186, 230, 253],
                        valueColor: [12, 74, 110]
                    },
                    {
                        label: 'Total Amount',
                        value: formatPdfCurrency(totalAmount),
                        note: `Avg ${formatPdfCurrency(avgOrder)}`,
                        color: [236, 253, 245],
                        border: [167, 243, 208],
                        valueColor: [6, 95, 70]
                    },
                    {
                        label: 'Top Payment',
                        value: topPayment ? topPayment[0] : 'N/A',
                        note: topPayment ? `${topPayment[1]} sales` : 'No payments',
                        color: [255, 251, 235],
                        border: [253, 230, 138],
                        valueColor: [146, 64, 14]
                    }
                ]);

                if (filteredSales.length === 0) {
                    doc.setFont('helvetica', 'bold');
                    doc.setFontSize(12);
                    doc.setTextColor(100, 116, 139);
                    doc.text('No sales found for this period.', 14, cursorY + 4);
                    const emptyName = `sales-report-${activeFilter}-${new Date().toISOString().slice(0, 10)}.pdf`;
                    finalizeModernPdfDoc(doc, meta);
                    doc.save(emptyName);
                    showToast('Sales PDF saved');
                    return;
                }

                cursorY = ensurePdfSpace(doc, cursorY, 18);
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(12);
                doc.setTextColor(17, 24, 39);
                doc.text('Sales Entries', 14, cursorY);

                const salesTableRows = filteredSales.map(s => [
                    new Date(s.date).toLocaleString(),
                    (s.items || []).map(i => i.name).join(', ').substring(0, 38),
                    formatPdfCurrency(s.finalTotal),
                    s.payment || 'N/A',
                    s.userName || 'Unknown'
                ]);

                const tableEndY = drawStyledPdfTable(doc, {
                    head: [['Date', 'Items', 'Total', 'Payment', 'User']],
                    body: salesTableRows,
                    startY: cursorY + 2,
                    columnStyles: {
                        2: { halign: 'right' }
                    }
                });

                const noteY = ensurePdfSpace(doc, tableEndY + 8, 10);
                doc.setFont('helvetica', 'normal');
                doc.setFontSize(9);
                doc.setTextColor(100, 116, 139);
                doc.text(`Filter: ${filterLabel}`, 14, noteY);
                doc.text(`Total exported amount: ${formatPdfCurrency(totalAmount)}`, pageWidth - 14, noteY, { align: 'right' });
                
                const salesFile = `sales-report-${activeFilter}-${new Date().toISOString().slice(0, 10)}.pdf`;
                finalizeModernPdfDoc(doc, meta);
                doc.save(salesFile);
                showToast('Sales PDF saved');
            }

            function generateAnalyticsPDF() {
                let totalRevenue = sales.reduce((a, s) => a + (s.finalTotal || 0), 0);
                let totalCost = 0;
                let productSales = {};

                sales.forEach(s => {
                    (s.items || []).forEach(itm => {
                        const qty = Number(itm.qty || 0);
                        const p = products.find(prod => String(prod.id) === String(itm.productId));
                        totalCost += (Number(p?.buyPrice || 0) * qty);

                        const key = String(itm.productId ?? itm.name ?? 'unknown');
                        if (!productSales[key]) {
                            productSales[key] = {
                                name: itm.name || p?.name || 'Unknown Product',
                                qty: 0,
                                revenue: 0
                            };
                        }
                        productSales[key].qty += qty;
                        productSales[key].revenue += Number((itm.price || 0) * qty);
                    });
                });

                let totalExpenses = expenses.reduce((a, e) => a + (e.amount || 0), 0);
                let netProfit = totalRevenue - totalCost - totalExpenses;
                let transactionCount = sales.length;
                let margin = totalRevenue > 0 ? ((netProfit / totalRevenue) * 100).toFixed(1) : '0.0';

                const last7Days = [];
                const dailyRevenue = [];
                for (let i = 6; i >= 0; i--) {
                    const date = new Date();
                    date.setDate(date.getDate() - i);
                    last7Days.push(date.toLocaleDateString('en', { weekday: 'short' }));
                    const dayTotal = sales
                        .filter(s => new Date(s.date).toDateString() === date.toDateString())
                        .reduce((sum, s) => sum + (s.finalTotal || 0), 0);
                    dailyRevenue.push(dayTotal);
                }

                const topProducts = Object.values(productSales)

            function buildReceiptPDF(sale) {
                const receiptNo = sale.receiptNumber || `RCPT-${sale.id}`;
                const saleDate = new Date(sale.date);
                const itemCount = (sale.items || []).reduce((sum, item) => sum + Number(item.qty || 0), 0);
                const { doc, pageWidth, startY, meta } = createModernPdfDoc('Sales Receipt', `${shopBrand?.name || 'Profit Point'} | ${receiptNo}`);

                let cursorY = drawPdfMetricCards(doc, startY, [
                    {
                        label: 'Receipt',
                        value: receiptNo,
                        note: saleDate.toLocaleString(),
                        color: [240, 249, 255],
                        border: [186, 230, 253],
                        valueColor: [12, 74, 110]
                    },
                    {
                        label: 'Payment',
                        value: sale.payment || 'N/A',
                        note: `${sale.paymentStatus || 'paid'} · Cashier: ${sale.userName || 'Unknown'}`,
                        color: [236, 253, 245],
                        border: [167, 243, 208],
                        valueColor: [6, 95, 70]
                    },
                    {
                        label: 'Total',
                        value: formatPdfCurrency(sale.finalTotal),
                        note: `${itemCount} item(s)${sale.discountAmount ? ` · Discount ${formatPdfCurrency(sale.discountAmount)}` : ''}`,
                        color: [255, 251, 235],
                        border: [253, 230, 138],
                        valueColor: [146, 64, 14]
                    }
                ]);

                cursorY = ensurePdfSpace(doc, cursorY, 20);
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(12);
                doc.setTextColor(17, 24, 39);
                doc.text('Purchased Items', 14, cursorY);

                const rows = (sale.items || []).map(item => {
                    const qty = Number(item.qty || 0);
                    const unitPrice = Number(item.price || 0);
                    return [
                        item.name || '-',
                        `${qty}`,
                        formatPdfCurrency(unitPrice),
                        formatPdfCurrency(unitPrice * qty)
                    ];
                });

                const finalY = drawStyledPdfTable(doc, {
                    head: [['Item', 'Qty', 'Unit Price', 'Line Total']],
                    body: rows,
                    startY: cursorY + 2,
                    columnStyles: {
                        1: { halign: 'right', cellWidth: 16 },
                        2: { halign: 'right', cellWidth: 33 },
                        3: { halign: 'right', cellWidth: 33 }
                    }
                });

                let totalY = ensurePdfSpace(doc, finalY + 8, 24);
                doc.setFont('helvetica', 'normal');
                doc.setFontSize(9);
                doc.setTextColor(71, 85, 105);
                if (sale.customerName) {
                    doc.text(`Customer: ${sale.customerName}`, 14, totalY);
                    totalY += 5;
                }
                if (sale.outstandingAmount > 0) {
                    doc.text(`Outstanding balance: ${formatPdfCurrency(sale.outstandingAmount)}`, 14, totalY);
                    totalY += 5;
                }
                if (sale.loyaltyEarnedPoints || sale.loyaltyRedeemedPoints) {
                    doc.text(`Loyalty: +${sale.loyaltyEarnedPoints || 0} pts / -${sale.loyaltyRedeemedPoints || 0} pts`, 14, totalY);
                    totalY += 5;
                }

                doc.setFont('helvetica', 'bold');
                doc.setFontSize(12);
                doc.setTextColor(17, 24, 39);
                doc.text(`Grand Total: ${formatPdfCurrency(sale.finalTotal)}`, pageWidth - 14, totalY, { align: 'right' });

                doc.setFont('helvetica', 'normal');
                doc.setFontSize(9);
                doc.setTextColor(100, 116, 139);
                doc.text(receiptSettings.footer || 'Thank you for your purchase.', 14, totalY);
                if (receiptSettings.showSupportPhone && receiptSettings.supportPhone) {
                    doc.text(`Support: ${receiptSettings.supportPhone}`, 14, totalY + 5);
                }

                finalizeModernPdfDoc(doc, meta);
                return doc;
            }

            async function sendReceiptOnWhatsApp(sale, phoneRaw) {
                const phone = String(phoneRaw || '').replace(/\D/g, '');
                if (!phone) {
                    showToast('Enter a WhatsApp number to send receipt', 'error');
                    return;
                }

                const doc = buildReceiptPDF(sale);
                const fileName = `receipt-${sale.id}.pdf`;
                const receiptNo = sale.receiptNumber || `RCPT-${sale.id}`;
                const message = `Hello, here is your receipt ${receiptNo} from ${shopBrand?.name || 'Profit Point'} for ${formatPdfCurrency(sale.finalTotal)}.`;

                try {
                    const blob = doc.output('blob');
                    const file = new File([blob], fileName, { type: 'application/pdf' });

                    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                        await navigator.share({
                            title: 'Sales Receipt',
                            text: message,
                            files: [file]
                        });
                        showToast('Receipt sent');
                        return;
                    }
                } catch (err) {
                    // Fallback below handles unsupported share or cancellation.
                }

                doc.save(fileName);
                const waUrl = `https://wa.me/${phone}?text=${encodeURIComponent(`${message} PDF downloaded, please attach it from your files.`)}`;
                const popup = window.open(waUrl, '_blank');
                if (!popup) {
                    try {
                        await navigator.clipboard.writeText(waUrl);
                        showToast('WhatsApp link copied. Open WhatsApp and paste it.');
                    } catch {
                        showToast('Open WhatsApp manually and attach the downloaded PDF.', 'error');
                    }
                    return;
                }
                showToast('PDF downloaded. Attach it in WhatsApp chat.');
            }

                let cartDiscountReason = '';
                let paymentStatus = 'paid';
                let customerName = '';
                let customerPhone = '';
                let redeemPoints = 0;
                let amountPaidDraft = null;

                const getTotals = () => {
                    const subtotal = cart.reduce((sum, item) => sum + (Number(item.price || 0) * Number(item.qty || 0)), 0);
                    const itemDiscountTotal = cart.reduce((sum, item) => sum + computeDiscountAmount(Number(item.price || 0) * Number(item.qty || 0), item.discountType, item.discountValue), 0);
                    const afterItemDiscounts = subtotal - itemDiscountTotal;
                    const cartDiscountAmount = computeDiscountAmount(afterItemDiscounts, cartDiscountType, cartDiscountValue);
                    const provisionalTotal = Math.max(0, afterItemDiscounts - cartDiscountAmount);
                    const customer = findCustomer(customerName, customerPhone);
                    const availablePoints = customer ? Number(customer.loyaltyPoints || 0) : 0;
                    const normalizedRedeemPoints = Math.max(0, Math.min(availablePoints, Number(redeemPoints || 0)));

                    const finalTotal = Math.max(0, provisionalTotal - loyaltyRedeemedValue);
                    return {
                        subtotal,
                        itemDiscountTotal,
                        cartDiscountAmount,

                        availablePoints,

                                    <input type="number" id="amountPaidInput" min="0" placeholder="Amount paid now" value="${paidValue}" style="width:100%; border:none; background:transparent; outline:none;">
                                </div>
                            </div>

                            <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.6rem; margin:0.8rem 0;">
                                <select id="discountTypeInput" style="width:100%; padding:0.8rem; border-radius:60px; border:1px solid #c2daf5; outline:none;">
                                    <option value="none" ${cartDiscountType === 'none' ? 'selected' : ''}>No cart discount</option>
                                    <option value="fixed" ${cartDiscountType === 'fixed' ? 'selected' : ''}>Fixed discount</option>
                                    <option value="percent" ${cartDiscountType === 'percent' ? 'selected' : ''}>Percent discount</option>
                                </select>
                                <input type="number" id="discountValueInput" min="0" placeholder="Discount value" value="${cartDiscountValue}" style="width:100%; padding:0.8rem; border-radius:60px; border:1px solid #c2daf5; outline:none;">
                            </div>
                            <div style="display:flex; align-items:center; gap:0.4rem; width:100%; padding:0.4rem 0.5rem 0.4rem 1rem; border-radius:60px; border:1px solid #c2daf5; background:white; margin-bottom:0.8rem;">
                                <i class="fas fa-comment-dots icon-one"></i>
                                <input type="text" id="discountReasonInput" placeholder="Discount reason" value="${cartDiscountReason}" style="width:100%; border:none; background:transparent; outline:none;">
                                <button type="button" class="voice-btn voice-mic-btn" data-target="discountReasonInput" style="font-size:0.7rem;" aria-label="Voice input"><i class="fas fa-microphone"></i> Mic</button>
                            </div>

                            <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.6rem; margin:0.8rem 0;">
                                <div style="display:flex; align-items:center; gap:0.55rem; width:100%; padding:0.8rem 1rem; border-radius:60px; border:1px solid #c2daf5; background:white;">
                                    <i class="fas fa-gift icon-one"></i>
                                    <input type="number" id="redeemPointsInput" min="0" placeholder="Redeem loyalty points" value="${totals.redeemPoints}" style="width:100%; border:none; background:transparent; outline:none;">
                                </div>
                                <div id="liveTotalCard" style="display:flex; align-items:center; justify-content:center; border-radius:28px; background:#f8fafc; border:1px solid #dbeafe; color:#475569; font-weight:700;">${formatMoney(total)}</div>
                            </div>

                            <div style="display:flex; gap:0.5rem; margin:1rem 0; flex-wrap:wrap;">
                                ${['Cash', 'Card', 'Mobile'].map(method => `
                                    <span class="payment-option ${selectedPayment === method ? 'active' : ''}" data-pay="${method}">
                                        ${method === 'Cash' ? __('cash') : method}
                                    </span>
                                `).join('')}
                            </div>

                            <div style="background:#f8fafc; border-radius:28px; padding:1rem; margin:1rem 0; color:#0f172a;">
                                <div style="display:flex; justify-content:space-between; margin-bottom:0.35rem;"><span>Subtotal</span><strong id="summarySubtotal">${formatMoney(totals.subtotal)}</strong></div>
                                <div style="display:flex; justify-content:space-between; margin-bottom:0.35rem;"><span>Item discounts</span><strong id="summaryItemDiscount">-${formatMoney(totals.itemDiscountTotal)}</strong></div>
                                <div style="display:flex; justify-content:space-between; margin-bottom:0.35rem;"><span>Cart discount</span><strong id="summaryCartDiscount">-${formatMoney(totals.cartDiscountAmount)}</strong></div>
                                <div style="display:flex; justify-content:space-between; margin-bottom:0.35rem;"><span>Loyalty redeemed</span><strong id="summaryLoyaltyDiscount">-${formatMoney(totals.loyaltyRedeemedValue)}</strong></div>
                                <div style="display:flex; justify-content:space-between; margin-bottom:0.35rem;"><span>Outstanding</span><strong id="summaryOutstanding">${formatMoney(Math.max(0, total - Math.max(0, paidValue)))}</strong></div>
                                <div style="display:flex; justify-content:space-between; font-size:1.1rem; color:#06c6d4;"><span>${__('total')}</span><strong id="summaryTotal">${formatMoney(total)}</strong></div>
                            </div>

                            <div style="display:flex; gap:1rem; margin-top:1.5rem;">
                                <button class="modal-btn secondary" id="closeCartModal"><i class="fas fa-times"></i> ${__('cancel')}</button>
                                <button class="modal-btn" id="modalCompleteSale"><i class="fas fa-check-circle"></i> ${__('complete')}</button>
                            </div>
                        </div>
                    `;

                    bindCartEvents();
                };

                const bindCartEvents = () => {
                    const refreshComputed = () => {
                        const totals = getTotals();
                        const paidRaw = Number(overlay.querySelector('#amountPaidInput')?.value || 0);
                        const adjustedPaid = paymentStatus === 'credit' ? 0 : Math.max(0, Math.min(totals.finalTotal, paidRaw));
                        if (paymentStatus === 'credit') {
                            const amountInput = overlay.querySelector('#amountPaidInput');
                            if (amountInput) amountInput.value = '0';
                            amountPaidDraft = 0;
                        }
                        overlay.querySelector('#liveTotalCard').textContent = formatMoney(totals.finalTotal);
                        overlay.querySelector('#summarySubtotal').textContent = formatMoney(totals.subtotal);
                        overlay.querySelector('#summaryItemDiscount').textContent = `-${formatMoney(totals.itemDiscountTotal)}`;
                        overlay.querySelector('#summaryCartDiscount').textContent = `-${formatMoney(totals.cartDiscountAmount)}`;
                        overlay.querySelector('#summaryLoyaltyDiscount').textContent = `-${formatMoney(totals.loyaltyRedeemedValue)}`;
                        overlay.querySelector('#summaryOutstanding').textContent = formatMoney(Math.max(0, totals.finalTotal - adjustedPaid));
                        overlay.querySelector('#summaryTotal').textContent = formatMoney(totals.finalTotal);
                        overlay.querySelector('#customerPointsHint').textContent = `Available loyalty points: ${totals.availablePoints}`;
                    };

                    overlay.querySelectorAll('.payment-option').forEach(el => {
                        el.addEventListener('click', event => {
                            event.preventDefault();
                            selectedPayment = el.dataset.pay;
                            renderCartOverlay();
                        });
                    });

                    overlay.querySelector('#closeCartModal')?.addEventListener('click', () => {
                        overlay.remove();
                        const badge = document.getElementById('cartItemCount');
                        if (badge) badge.textContent = cart.reduce((a, i) => a + i.qty, 0);
                    });

                    overlay.querySelectorAll('.cart-item-remove-btn').forEach(button => {
                        button.addEventListener('click', event => {
                            event.stopPropagation();
                            const idx = Number(button.dataset.idx);
                            if (!Number.isNaN(idx)) {
                                cart.splice(idx, 1);
                                saveCart();
                                amountPaidDraft = null;
                                renderCartOverlay();
                                const badge = document.getElementById('cartItemCount');
                                if (badge) badge.textContent = cart.reduce((a, i) => a + i.qty, 0);
                            }
                        });
                    });

                    overlay.querySelectorAll('.cart-item-price-btn').forEach(button => {
                        button.addEventListener('click', () => {
                            const idx = Number(button.dataset.idx);
                            const item = cart[idx];
                            if (!item) return;
                            showEnhancedModal({
                                title: 'Edit price',
                                fields: [
                                    { name: 'price', type: 'number', value: Number(item.price || 0), placeholder: 'Unit price' }
                                ],
                                onConfirm: data => {
                                    const nextPrice = Number(data.price || 0);
                                    if (nextPrice <= 0) {
                                        showToast('Price must be greater than zero', 'error');
                                        return;
                                    }
                                    item.price = nextPrice;
                                    saveCart();
                                    renderCartOverlay();
                                }
                            });
                        });
                    });

                    overlay.querySelectorAll('.cart-item-discount-btn').forEach(button => {
                        button.addEventListener('click', () => {
                            const idx = Number(button.dataset.idx);
                            const item = cart[idx];
                            if (!item) return;
                            showEnhancedModal({
                                title: 'Item discount',
                                fields: [
                                    {
                                        name: 'discountType',
                                        type: 'select',
                                        value: item.discountType || 'none',
                                        options: [
                                            { value: 'none', label: 'No discount' },
                                            { value: 'fixed', label: 'Fixed' },
                                            { value: 'percent', label: 'Percent' }
                                        ]
                                    },
                                    { name: 'discountValue', type: 'number', value: item.discountValue || 0, placeholder: 'Discount value' }
                                ],
                                onConfirm: data => {
                                    item.discountType = data.discountType || 'none';
                                    item.discountValue = Number(data.discountValue || 0);
                                    saveCart();
                                    renderCartOverlay();
                                }
                            });
                        });
                    });

                    overlay.querySelector('#paymentStatusInput')?.addEventListener('change', event => {
                        paymentStatus = event.target.value;
                        if (paymentStatus === 'paid') {
                            const totals = getTotals();
                            const amountInput = overlay.querySelector('#amountPaidInput');
                            if (amountInput) {
                                amountInput.value = totals.finalTotal;
                                amountPaidDraft = totals.finalTotal;
                            }
                        }
                        refreshComputed();
                    });

                    overlay.querySelector('#discountTypeInput')?.addEventListener('change', event => {
                        cartDiscountType = event.target.value;
                        refreshComputed();
                    });

                    overlay.querySelector('#discountValueInput')?.addEventListener('input', event => {
                        cartDiscountValue = Number(event.target.value || 0);
                        refreshComputed();
                    });

                    overlay.querySelector('#discountReasonInput')?.addEventListener('input', event => {
                        cartDiscountReason = event.target.value;
                    });

                    overlay.querySelector('#customerNameInput')?.addEventListener('input', event => {
                        customerName = event.target.value;
                        refreshComputed();
                    });

                    overlay.querySelector('#customerPhoneInput')?.addEventListener('input', event => {
                        customerPhone = event.target.value;
                        refreshComputed();
                    });

                    overlay.querySelector('#redeemPointsInput')?.addEventListener('input', event => {
                        redeemPoints = Number(event.target.value || 0);
                        refreshComputed();
                    });

                    overlay.querySelector('#amountPaidInput')?.addEventListener('input', event => {
                        amountPaidDraft = Number(event.target.value || 0);
                        refreshComputed();
                    });

                    overlay.querySelector('#modalCompleteSale')?.addEventListener('click', async () => {
                        if (cart.length === 0) {
                            showToast(__('emptyCart'), 'error');
                            overlay.remove();
                            return;
                        }

                        customerName = (overlay.querySelector('#customerNameInput')?.value || '').trim();
                        customerPhone = (overlay.querySelector('#customerPhoneInput')?.value || '').trim();
                        const phoneInput = (overlay.querySelector('#receiptPhoneInput')?.value || '').trim();
                        const shouldSendReceipt = !!overlay.querySelector('#sendReceiptWhatsApp')?.checked;
                        const paidNowInput = Number(overlay.querySelector('#amountPaidInput')?.value || 0);
                        const redeemPointsRequested = Number(overlay.querySelector('#redeemPointsInput')?.value || 0);
                        paymentStatus = overlay.querySelector('#paymentStatusInput')?.value || paymentStatus;
                        cartDiscountType = overlay.querySelector('#discountTypeInput')?.value || cartDiscountType;
                        cartDiscountValue = Number(overlay.querySelector('#discountValueInput')?.value || 0);
                        cartDiscountReason = overlay.querySelector('#discountReasonInput')?.value || '';

                        receiptWhatsAppPhone = phoneInput;
                        autoSendReceiptWhatsApp = shouldSendReceipt;
                        localStorage.setItem('profitpoint_receipt_phone', receiptWhatsAppPhone);
                        localStorage.setItem('profitpoint_receipt_auto', autoSendReceiptWhatsApp ? '1' : '0');

                        if ((paymentStatus === 'credit' || paymentStatus === 'layaway' || paymentStatus === 'partial') && !customerName && !customerPhone) {
                            showToast('Customer name or phone is required for balance tracking', 'error');
                            return;
                        }

                        const customer = getOrCreateCustomer(customerName, customerPhone);
                        const availablePoints = customer ? Number(customer.loyaltyPoints || 0) : 0;
                        const redeemedPoints = Math.max(0, Math.min(availablePoints, redeemPointsRequested));

                        const subtotal = cart.reduce((sum, item) => sum + (Number(item.price || 0) * Number(item.qty || 0)), 0);
                        const itemDiscountTotal = cart.reduce((sum, item) => sum + computeDiscountAmount(Number(item.price || 0) * Number(item.qty || 0), item.discountType, item.discountValue), 0);
                        const afterItemDiscounts = subtotal - itemDiscountTotal;
                        const cartDiscountAmount = computeDiscountAmount(afterItemDiscounts, cartDiscountType, cartDiscountValue);
                        const provisionalTotal = Math.max(0, afterItemDiscounts - cartDiscountAmount);
                        const loyaltyRedeemedValue = Math.min(provisionalTotal, redeemedPoints * Number(loyaltySettings.redeemValuePerPoint || 0));
                        const finalTotal = Math.max(0, provisionalTotal - loyaltyRedeemedValue);

                        let amountPaidNow = finalTotal;
                        if (paymentStatus === 'partial' || paymentStatus === 'layaway') {
                            amountPaidNow = Math.min(finalTotal, Math.max(0, paidNowInput));
                        }
                        if (paymentStatus === 'credit') {
                            amountPaidNow = 0;
                        }
                        if (paymentStatus === 'paid') {
                            amountPaidNow = finalTotal;
                        }

                        for (const item of cart) {
                            const product = products.find(productItem => String(productItem.id) === String(item.productId));
                            if (!product || Number(product.stock || 0) < Number(item.qty || 0)) {
                                showToast(`${item.name} has insufficient stock`, 'error');
                                return;
                            }
                        }

                        const saleItems = cart.map(item => ({
                            productId: item.productId,
                            name: item.name,
                            qty: item.qty,
                            price: item.price,
                            variant: item.variant || '',
                            discountType: item.discountType || 'none',
                            discountValue: Number(item.discountValue || 0),
                            discountAmount: computeDiscountAmount(Number(item.price || 0) * Number(item.qty || 0), item.discountType, item.discountValue)
                        }));

                        saleItems.forEach(item => {
                            const product = products.find(productItem => String(productItem.id) === String(item.productId));
                            if (product) {
                                product.stock = Number(product.stock || 0) - Number(item.qty || 0);
                                if (Number(product.stock || 0) <= Number(product.minStock || 0)) {
                                    pushNotification('Low stock', `${product.name} is down to ${product.stock}`, 'warning');
                                }
                            }
                        });
                        saveProducts();

                        const sale = createSaleRecord({
                            items: saleItems,
                            subtotal,
                            payment: selectedPayment,
                            paymentStatus,
                            amountPaidNow,
                            customerId: customer?.id || null,
                            customerName: customer?.name || '',
                            customerPhone: customer?.phone || '',
                            discountType: cartDiscountType,
                            discountValue: cartDiscountValue,
                            discountAmount: itemDiscountTotal + cartDiscountAmount,
                            discountReason: cartDiscountReason,
                            loyaltyRedeemedPoints: redeemedPoints,
                            loyaltyRedeemedValue,
                            note: paymentStatus === 'layaway' ? 'Layaway sale' : ''
                        });

                        const loyalty = awardLoyalty(customer?.id, sale.finalTotal, redeemedPoints);
                        sale.loyaltyEarnedPoints = loyalty.earned;
                        sale.loyaltyRedeemedValue = loyaltyRedeemedValue;
                        saveSales();

                        cart = [];
                        saveCart();
                        overlay.remove();
                        showToast(`Sale completed · ${sale.receiptNumber}`);
                        renderPosMobile();

                        if (shouldSendReceipt) {
                            await sendReceiptOnWhatsApp(sale, phoneInput);
                        }
                    });

                    refreshComputed();
                    attachContactPickersToDOM(overlay);
                };

                document.body.appendChild(overlay);
                renderCartOverlay();
            }

            // ==================== POS PAGE ====================
            function renderPosMobile() {
                let searchTerm = '';
                
                const filterProducts = () => {
                    return products.filter(p => 
                        (searchTerm === '' || p.name.toLowerCase().includes(searchTerm.toLowerCase()) || String(p.barcode || '').includes(searchTerm))
                    );
                };
                
                const renderPosContent = () => {
                    const filtered = filterProducts();
                    const favorites = products.filter(product => product.favorite).slice(0, 6);
                    const recent = recentProductIds.map(id => products.find(product => String(product.id) === String(id))).filter(Boolean).slice(0, 6);
                    const topSelling = getTopSellingProducts(5);
                    
                    
                    let productGridHtml = filtered.map(p => {
                        let imgHtml = p.image ? 
                            `<img src="${p.image}" style="width:100%; height:100%; object-fit:cover;">` : 
                            '<i class="fas fa-box" style="font-size:2rem; color:#06c6d4;"></i>';
                        
                        return `
                            <div class="product-tile-mobile" data-id="${p.id}" data-name="${p.name}" data-price="${p.sellPrice}" data-stock="${p.stock}">
                                <div class="product-image-mobile">${imgHtml}</div>
                                <div class="product-info-panel">
                                    <div class="product-name-mobile">${p.name}</div>
                                    <div class="product-price-mobile">TSh ${Number(p.sellPrice).toLocaleString()}</div>
                                    <div class="stock-badge-mobile">${p.stock} ${__('quantity')}</div>
                                </div>
                            </div>
                        `;
                    }).join('');
                    
                    let html = `
                        <div style="display:flex; align-items:center; gap:0.5rem; background:#ecf5fe; border-radius:60px; padding:0.2rem 0.5rem 0.2rem 1rem; margin-bottom:0.5rem;">
                            <i class="fas fa-search icon-one"></i>
                            <input type="text" id="mobileSearch" placeholder="${__('search')}" value="${searchTerm}" 
                                style="border:none; background:transparent; padding:0.9rem 0; width:100%; outline:none;">
                            <button type="button" id="voiceSearchBtn" class="voice-btn" title="Voice search" aria-label="Search by voice">
                                <i class="fas fa-microphone"></i> Mic
                            </button>
                            <button type="button" id="scanBarcodeBtn" class="icon-btn" style="padding:0.5rem 1rem; background:var(--color-accent); color:#fff; border-color:var(--color-accent); flex-shrink:0;">
                                <i class="fas fa-barcode" style="color:#fff;"></i> Scan
                            </button>
                        </div>
                        
                        <div class="product-grid-mobile" id="mobileProductGrid">
                            ${productGridHtml || '<p style="grid-column:span2; text-align:center;">No products found</p>'}
                        </div>
                        
                        <div class="cart-fab">
                            <button class="cart-btn" id="toggleCartBtn" aria-label="Open cart">
                                <i class="fas fa-shopping-cart icon-one"></i> ${__('cart')}
                                <span class="cart-badge" id="cartItemCount">${cart.reduce((a, i) => a + i.qty, 0)}</span>
                            </button>
                        </div>
                    `;
                    
                    document.getElementById('mobileContent').innerHTML = html;
                    
                    const searchInput = document.getElementById('mobileSearch');
                    if (searchInput) {
                        searchInput.addEventListener('input', (e) => {
                            searchTerm = e.target.value;
                            renderPosContent();
                        });
                    }

                    // Voice search
                    const voiceBtn = document.getElementById('voiceSearchBtn');
                    if (voiceBtn) {
                        voiceBtn.addEventListener('click', () => startVoiceSearch());
                    }
                    
                    document.querySelectorAll('.product-tile-mobile').forEach(t => {
                        t.addEventListener('click', (e) => {
                            e.preventDefault();
                            const id = t.dataset.id;
                            const stock = parseInt(t.dataset.stock);
                            const product = products.find(item => String(item.id) === String(id));
                            
                            if (stock <= 0) {
                                showToast(__('outOfStock'), 'error');
                                return;
                            }

                            // Flying-to-cart animation
                            (function() {
                                const tileRect = t.getBoundingClientRect();
                                const cartBtnEl = document.getElementById('toggleCartBtn');
                                if (!cartBtnEl) return;
                                const cartRect = cartBtnEl.getBoundingClientRect();
                                const fly = document.createElement('div');
                                fly.className = 'flying-product';
                                fly.style.left   = tileRect.left + 'px';
                                fly.style.top    = tileRect.top  + 'px';
                                fly.style.width  = tileRect.width  + 'px';
                                fly.style.height = tileRect.height + 'px';
                                const img = t.querySelector('.product-image-mobile img');
                                if (img && img.src) {
                                    fly.style.backgroundImage = `url('${img.src}')`;
                                } else {
                                    fly.style.background = 'linear-gradient(135deg,#06c6d4,#0492a0)';
                                    fly.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#fff;font-size:1.8rem;"><i class="fas fa-shopping-bag"></i></div>';
                                }
                                const destX = cartRect.left + cartRect.width  / 2 - tileRect.left - tileRect.width  / 2;
                                const destY = cartRect.top  + cartRect.height / 2 - tileRect.top  - tileRect.height / 2;
                                fly.style.setProperty('--fly-x', destX + 'px');
                                fly.style.setProperty('--fly-y', destY + 'px');
                                document.body.appendChild(fly);
                                fly.style.animation = 'flyToCart 0.75s cubic-bezier(0.25,0.46,0.45,0.94) forwards';
                                setTimeout(() => fly.remove(), 760);
                            })();

                            showVariantPicker(product, variant => {
                                addProductToCart(product, variant);
                                const cartBtn = document.getElementById('toggleCartBtn');
                                if (cartBtn) {
                                    cartBtn.classList.add('cart-bump');
                                    setTimeout(() => cartBtn.classList.remove('cart-bump'), 400);
                                }
                                renderPosContent();
                            });
                            
                        });
                    });

                    document.querySelectorAll('.quick-pick').forEach(chip => {
                        chip.addEventListener('click', () => {
                            const product = products.find(item => String(item.id) === String(chip.dataset.id));
                            if (!product) return;
                            showVariantPicker(product, variant => {
                                addProductToCart(product, variant);
                                renderPosContent();
                            });
                        });
                    });

                    document.getElementById('scanBarcodeBtn')?.addEventListener('click', async () => {
                        try {
                            await scanBarcode(rawValue => {
                                const product = findProductByBarcode(rawValue);
                                if (!product) {
                                    showToast(`No product found for ${rawValue}`, 'error');
                                    searchTerm = rawValue;
                                    renderPosContent();
                                    return;
                                }
                                showVariantPicker(product, variant => {
                                    addProductToCart(product, variant);
                                    renderPosContent();
                                    showToast(`${product.name} scanned`);
                                });
                            });
                        } catch {
                            showToast('Unable to start barcode scanner', 'error');
                        }
                    });
                    
                    document.getElementById('toggleCartBtn')?.addEventListener('click', (e) => {
                        e.preventDefault();
                        showCartModal();
                    });
                };
                
                renderPosContent();
            }

            // ==================== PRODUCTS PAGE ====================
            function renderProductsMobile() {
                if (!isManager()) {
                    showToast('Manager only', 'error');
                    renderPosMobile();
                    return;
                }

                const supplierOptions = [{ value: '', label: 'No supplier' }, ...suppliers.map(supplier => ({ value: supplier.id, label: supplier.name }))];
                
                const totalProducts = products.length;
                const totalStockValue = products.reduce((sum, p) => sum + (Number(p.sellPrice || 0) * Number(p.stock || 0)), 0);
                const lowStockCount = products.filter(p => Number(p.stock || 0) <= Number(p.minStock || 0) && Number(p.stock || 0) > 0).length;
                const outOfStockCount = products.filter(p => Number(p.stock || 0) <= 0).length;

                let html = `
                    <div style="padding: 0.2rem 0;">
                        <div class="pm-header">
                            <h3><i class="fas fa-cubes icon-one"></i> ${__('productTitle')}</h3>
                            <div class="pm-header-actions">
                                <button class="btn-small analytics-ghost-btn" id="addSupplierBtn" style="min-height:auto; padding:0.6rem 0.9rem;"><i class="fas fa-truck"></i> Supplier</button>
                                <button class="btn-small" id="addProdBtn" style="min-height:auto; padding:0.6rem 0.9rem;"><i class="fas fa-plus"></i> ${__('addProduct')}</button>
                            </div>
                        </div>

                        <div class="pm-stats">
                            <div class="pm-stat-card">
                                <div class="pm-stat-value">${totalProducts}</div>
                                <div class="pm-stat-label">Products</div>
                            </div>
                            <div class="pm-stat-card profit">
                                <div class="pm-stat-value">${formatMoney(totalStockValue)}</div>
                                <div class="pm-stat-label">Stock Value</div>
                            </div>
                            <div class="pm-stat-card warning">
                                <div class="pm-stat-value">${lowStockCount + outOfStockCount}</div>
                                <div class="pm-stat-label">Low / Out</div>
                            </div>
                        </div>

                        <div class="pm-search">
                            <i class="fas fa-search" style="color:#94a3b8;"></i>
                            <input type="text" id="pmSearchInput" placeholder="Search products...">
                        </div>

                        <div id="pmProductList">
                `;
                
                products.forEach(p => {
                    const imgHtml = p.image ? 
                        `<img src="${p.image}">` : 
                        '<i class="fas fa-box" style="font-size:1.4rem; color:#06c6d4;"></i>';
                    
                    const profit = Number(p.sellPrice || 0) - Number(p.buyPrice || 0);
                    const profitClass = profit < 0 ? 'negative' : '';
                    const stock = Number(p.stock || 0);

                            </div>

                html += `
                        </div>
                    </div>

                document.getElementById('mobileContent').innerHTML = html;

                document.getElementById('addSupplierBtn')?.addEventListener('click', () => {

                            { name: 'phone', placeholder: 'Phone number' },
                            { name: 'notes', placeholder: 'Notes' }

                            suppliers.unshift({
                                id: `s${Date.now()}`,

                                contact: data.contact || '',
                                phone: data.phone || '',
                                notes: data.notes || '',
                                createdAt: new Date().toISOString()
                            });

                            renderProductsMobile();

                    });
                });
                
                document.getElementById('addProdBtn').addEventListener('click', () => {
                    showEnhancedModal({
                        title: __('newProduct'),
                        withImage: true,
                        imageLabel: __('productImage'),
                        fields: [
                            { name: 'name', placeholder: __('productName') },
                            { name: 'buyPrice', placeholder: __('buyPrice'), type: 'number' },
                            { name: 'sellPrice', placeholder: __('sellPrice'), type: 'number' },
                            { name: 'stock', placeholder: __('quantity'), type: 'number', value: 0 },
                            { name: 'minStock', placeholder: 'Minimum stock', type: 'number', value: 5 },

                            { name: 'variants', placeholder: 'Variants (comma separated)' },

                        ],

                            products.push({

                                name: d.name,
                                category: d.category,
                                buyPrice: parseFloat(d.buyPrice) || 0,
                                sellPrice: parseFloat(d.sellPrice) || 0,
                                stock: parseInt(d.stock) || 0,
                                minStock: parseInt(d.minStock) || 5,
                                barcode: d.barcode || '',
                                supplierId: d.supplierId || '',
                                supplierName: supplier?.name || '',

                                favorite: d.favorite === '1',
                                image: d.image || null,
                                stockHistory: []

                            saveProducts();
                            recordAudit('product-created', `Product ${d.name} created`);
                            renderProductsMobile();
                            showToast('Product added');
                        }
                    });
                });

                document.querySelectorAll('.stock-intake-btn').forEach(button => {
                    button.addEventListener('click', () => {
                        const product = products.find(item => String(item.id) === String(button.dataset.id));
                        if (!product) return;
                        showEnhancedModal({
                            title: `Stock intake · ${product.name}`,
                            fields: [
                                { name: 'qty', type: 'number', placeholder: 'Quantity received', value: 1 },
                                { name: 'costPerUnit', type: 'number', placeholder: 'Cost per unit', value: product.buyPrice || 0 },
                                { name: 'note', placeholder: 'Intake note', value: 'Manual stock intake' }

                            onConfirm: data => {
                                addStockIntake(product.id, data.qty, data.costPerUnit, data.note || 'Manual stock intake');

                                showToast('Stock updated');

                document.querySelectorAll('.create-po-btn').forEach(button => {
